# Ejecutar siempre desde backend/ (el cwd debe contener app/ y alembic/):
#   cd backend && alembic revision --autogenerate -m "descripcion"
#   cd backend && alembic upgrade head
# DATABASE_URL en .env (raíz del repo o backend/) sobrescribe sqlalchemy.url.

[alembic]
script_location = alembic
sqlalchemy.url = postgresql://admin:adminpassword@localhost:5432/iptv_erp
